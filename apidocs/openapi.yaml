        "405": { $ref: "#/components/responses/PlainTextError" }
        "500": { $ref: "#/components/responses/PlainTextError" }

  /trust/graph:
    get:
      tags: [trust]
      summary: Full public trust graph (append-only edge feed)
      description: Only wired when a trust ledger is configured.
      security: []
      responses:
        "200":
          description: Edges
          content:
            application/json:
              schema:
                type: object
                properties:
                  edges:
                    type: array
                    items: { $ref: "#/components/schemas/TrustEdge" }
                  count: { type: integer }
                required: [edges, count]
        "405": { $ref: "#/components/responses/PlainTextError" }
        "500": { $ref: "#/components/responses/PlainTextError" }

  /trust/node/{addr}:
    get:
      tags: [trust]
      summary: Trust info for a single address
      security: []
      parameters:
        - name: addr
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Node + its edges
          content:
            application/json:
              schema:
                type: object
                properties:
                  node: { $ref: "#/components/schemas/TrustNode" }
                  edges:
                    type: array
                    items: { $ref: "#/components/schemas/TrustEdge" }
                required: [node, edges]
        "400": { $ref: "#/components/responses/PlainTextError" }
        "405": { $ref: "#/components/responses/PlainTextError" }
        "500": { $ref: "#/components/responses/PlainTextError" }

  /trust/attestation/{id}:
    get:
      tags: [trust]
      summary: A single attestation by id
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Attestation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Attestation" }
        "400": { $ref: "#/components/responses/PlainTextError" }
        "404": { $ref: "#/components/responses/PlainTextError" }
        "405": { $ref: "#/components/responses/PlainTextError" }
        "500": { $ref: "#/components/responses/PlainTextError" }

  /trust/log:
    get:
      tags: [trust]
      summary: Append-only ledger log
      security: []
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 100, minimum: 1 }
      responses:
        "200":
          description: Log entries (entry shape is ledger-internal; returned as an opaque array)
          content:
            application/json:
              schema:
                type: object
                properties:
                  log:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                      description: Ledger log entry; concrete shape not fixed by the HTTP layer.
                  count: { type: integer }
                required: [log, count]
        "405": { $ref: "#/components/responses/PlainTextError" }
        "500": { $ref: "#/components/responses/PlainTextError" }

  /trust/allowlist:
    get:
      tags: [trust]
      summary: Addresses meeting trust thresholds
      security: []
      parameters:
        - name: min_edges
          in: query
          required: false
          schema: { type: integer, default: 1, minimum: 1 }
        - name: min_bilateral
          in: query
          required: false
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        "200":
          description: Trusted addresses
          content:
            application/json:
              schema:
                type: object
                properties:
                  addrs:
                    type: array
                    items: { $ref: "#/components/schemas/TrustNode" }
                  count: { type: integer }
                  criteria:
                    type: object
                    properties:
                      min_edges: { type: integer }
                      min_bilateral: { type: integer }
                required: [addrs, count, criteria]
        "405": { $ref: "#/components/responses/PlainTextError" }
        "500": { $ref: "#/components/responses/PlainTextError" }

  /trust/attest:
    post:
      tags: [trust]
      summary: Submit / confirm / revoke an attestation over HTTP (admin-protected)
      description: |
        Admin-gated. Simulates the DKIM-signed email flow for dev. The body is a
        free-form JSON object; the fields read depend on `action`. HTTP
        submissions are never marked DKIM-verified. Common shapes:
        - New attestation (no `action`): requires `sender_email`,
          `attestation_id`, `attestation_type`, `subject`. Returns `201`.
        - `action: "confirm"`: requires `sender_email`, `attestation_id`.
        - `action: "revoke"`: requires `sender_email`, `attestation_id`,
          optional `reason`.
      security:
        - AdminPassword: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TrustAttestSubmit" }
      responses:
        "200":
          description: Confirmed or revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [confirmed, revoked] }
                  attestation_id: { type: string }
                required: [status, attestation_id]
        "201":
          description: New attestation recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  attestation_id: { type: string }
                  edge_kind: { type: string, enum: [bilateral, unilateral] }
                required: [status, attestation_id, edge_kind]
        "400": { $ref: "#/components/responses/PlainTextError" }
        "401": { $ref: "#/components/responses/PlainTextError" }
        "405": { $ref: "#/components/responses/PlainTextError" }

  /trust/publish:
    put:
      tags: [trust]
      summary: Set field publish preferences for a subject (admin-protected)
      security:
        - AdminPassword: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PublishPreference" }
      responses:
        "200": { $ref: "#/components/responses/StatusOk" }
        "400": { $ref: "#/components/responses/PlainTextError" }
        "401": { $ref: "#/components/responses/PlainTextError" }
        "405": { $ref: "#/components/responses/PlainTextError" }
        "500": { $ref: "#/components/responses/PlainTextError" }

components:
  securitySchemes:
    AdminPassword:
      type: apiKey
      in: header
      name: X-Admin-Password
      description: |
        Admin password header. If the server was started with an empty admin
        password (dev mode), the check is skipped and any request passes.
    PortalToken:
      type: apiKey
      in: query
      name: token
      description: |
        Advertiser or publisher access token, passed as the `token` query
        parameter. Advertiser tokens come from `/advertiser/register`; publisher
        tokens from `/publisher/register`, `/admin/publishers`, or
        `/publisher/login`.

  parameters:
    AdvertiserIdPath:
      name: id
      in: path
      required: true
      description: Advertiser/position id (e.g. `adv-1`).
      schema: { type: string }
    Token:
      name: token
      in: query
      required: true
      schema: { type: string }
    Limit:
      name: limit
      in: query
      required: false
      description: Page size (server default applies when 0/absent; typically 20).
      schema: { type: integer }
    Offset:
      name: offset
      in: query
      required: false
      schema: { type: integer }
    GroupBy:
      name: group_by
      in: query
      required: false
      description: Aggregation bucket. Defaults to `day`.
      schema: { type: string, enum: [day, week, month], default: day }

  responses:
    PlainTextError:
      description: |
        Error. Body is a plain-text message from Go's `http.Error` (a
        `text/plain` line), not JSON.
      content:
        text/plain:
          schema: { type: string }
    StatusOk:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, example: ok }
            required: [status]

  schemas:
    RegisterRequest:
      type: object
      description: |
        Register either an intent position (`intent` + `sigma` > 0) or a keyword
        group (`keywords` + optional `sigma`, default 0). The two are mutually
        exclusive.
      properties:
        name: { type: string }
        intent:
          type: string
          description: Natural-language positioning statement (mutually exclusive with keywords).
        keywords:
          type: array
          items: { type: string }
          description: One position per keyword, sharing one budget (σ defaults to 0).
        sigma: { type: number, format: double }
        bid_price: { type: number, format: double }
        budget: { type: number, format: double }
        currency: { type: string, default: USD }
        url: { type: string }
      required: [name, bid_price, budget]

    RegisterIntentResponse:
      type: object
      properties:
        id: { type: string, example: adv-1 }
        name: { type: string }
        intent: { type: string }
        sigma: { type: number, format: double }
        bid_price: { type: number, format: double }
        currency: { type: string }
        url: { type: string }
        token:
          type: string
          description: Present only when a DB is configured.
      required: [id, name, intent, sigma, bid_price, currency, url]

    RegisterKeywordGroupResponse:
      type: object
      properties:
        budget_id:
          type: string
          description: Group head id; holds the shared budget.
        positions:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              name: { type: string }
              keyword:
                type: string
                description: The keyword (stored in the position's intent field).
              sigma: { type: number, format: double }
              bid_price: { type: number, format: double }
              currency: { type: string }
              url: { type: string }
              budget_id: { type: string }
        token:
          type: string
          description: Present only when a DB is configured.
      required: [budget_id, positions]

    UpdateRequest:
      type: object
      description: |
        Partial update. Omitted string fields keep their current value. `sigma`
        is nullable: omit to keep the existing σ, send `0` for the keyword
        limit. `budget` > 0 updates the shared budget.
      properties:
        name: { type: string }
        intent: { type: string }
        sigma:
          type: [number, "null"]
          format: double
        bid_price: { type: number, format: double }
        budget: { type: number, format: double }
        url: { type: string }

    Position:
      type: object
      description: |
        Registered advertiser position. The embedding vector is intentionally
        omitted from this serialization.
      properties:
        id: { type: string }
        name: { type: string }
        intent: { type: string }
        sigma: { type: number, format: double }
        bid_price: { type: number, format: double }
        currency: { type: string }
        url: { type: string }
        budget_id:
          type: string
          description: Set on keyword-group members; points at the group head.
      required: [id, name, intent, sigma, bid_price, currency, url]

    BudgetInfo:
      type: object
      properties:
        advertiser_id: { type: string }
        total: { type: number, format: double }
        spent: { type: number, format: double }
        remaining: { type: number, format: double }
        currency: { type: string }
      required: [advertiser_id, total, spent, remaining, currency]

    EmbeddingEntry:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        embedding:
          type: array
          items: { type: number, format: double }
        bid_price: { type: number, format: double }
        sigma: { type: number, format: double }
        currency: { type: string }
      required: [id, name, embedding, bid_price, sigma, currency]

    SimulationResult:
      type: object
      properties:
        intent: { type: string }
        winner:
          oneOf:
            - $ref: "#/components/schemas/BidderDetail"
            - type: "null"
        all_bidders:
          type: array
          items: { $ref: "#/components/schemas/BidderDetail" }
        payment: { type: number, format: double }
        bid_count: { type: integer }
        tau_thresholds:
          type: array
          items:
            type: object
            properties:
              tau: { type: number, format: double }
              count: { type: integer }
            required: [tau, count]
      required: [intent, all_bidders, payment, bid_count, tau_thresholds]

    BidderDetail:
      type: object
      properties:
        id: { type: string }
        rank: { type: integer }
        name: { type: string }
        intent: { type: string }
        bid_price: { type: number, format: double }
        sigma: { type: number, format: double }
        score: { type: number, format: double }
        distance_sq: { type: number, format: double }
        log_bid: { type: number, format: double }
        click_url: { type: string }
        ad_title: { type: string }
        ad_subtitle: { type: string }
      required: [id, rank, name, intent, bid_price, sigma, score, distance_sq, log_bid]

    EventRequest:
      type: object
      description: |
        `advertiser_id` is always required. `auction_id` is required (> 0) for
        `/event/click`; for impression/viewable it may be 0.
      properties:
        auction_id: { type: integer, format: int64 }
        advertiser_id: { type: string }
        user_id: { type: string }
        publisher_id: { type: string }
      required: [advertiser_id]

    AuctionRequest:
      type: object
      description: |
        Private-auction request. Send `encrypted_embedding`; a top-level
        plaintext `embedding` is rejected with `400`.
      properties:
        encrypted_embedding: { $ref: "#/components/schemas/EncryptedEmbedding" }
        embedding:
          type: array
          items: { type: number, format: double }
          description: Rejected if non-empty (plaintext not accepted).
        tau: { type: number, format: double }
        publisher_id: { type: string }
      required: [encrypted_embedding]

    EncryptedEmbedding:
      type: object
      properties:
        aes_key_encrypted:
          type: string
          description: RSA-encrypted AES key. Required (non-empty).
        encrypted_payload:
          type: string
          description: AES-encrypted embedding payload. Required (non-empty).
        nonce:
          type: string
          description: AES-GCM nonce. Required — decryption fails without it.
        hash_algorithm:
          type: string
          description: Optional; defaults to SHA-256.
      required: [aes_key_encrypted, encrypted_payload, nonce]

    AdRequestResponse:
      type: object
      properties:
        auction_id: { type: integer, format: int64 }
        winner_id: { type: string }
        payment: { type: number, format: double }
        currency: { type: string }
        bid_count: { type: integer }
      required: [auction_id, winner_id, payment, currency, bid_count]

    AttestationResponse:
      type: object
      properties:
        public_key:
          type: string
          description: RSA public key PEM to encrypt an `/ad-request` envelope against.
        attestation_cose_base64:
          type: string
          description: |
            COSE attestation, base64. In the mock deployment this is the literal
            string `mock-attestation-not-for-production`.
      required: [public_key, attestation_cose_base64]

    Creative:
      type: object
      properties:
        id: { type: integer, format: int64 }
        advertiser_id: { type: string }
        title: { type: string }
        subtitle: { type: string }
        active: { type: boolean }
        created_at:
          type: string
          description: Present on list reads; omitted on create/update echoes.
      required: [id, advertiser_id, title, subtitle, active]

    PortalMe:
      type: object
      description: Advertiser profile plus budget fields (budget fields present when a budget exists).
      properties:
        id: { type: string }
        name: { type: string }
        intent: { type: string }
        sigma: { type: number, format: double }
        bid_price: { type: number, format: double }
        currency: { type: string }
        url: { type: string }
        budget_total: { type: number, format: double }
        budget_spent: { type: number, format: double }
        budget_remaining: { type: number, format: double }
      required: [id, name, intent, sigma, bid_price, currency, url]

    AuctionRow:
      type: object
      properties:
        id: { type: integer, format: int64 }
        intent: { type: string }
        winner_id: { type: string }
        winner_name: { type: string }
        payment: { type: number, format: double }
        currency: { type: string }
        bid_count: { type: integer }
        created_at: { type: string }
      required: [id, intent, winner_id, winner_name, payment, currency, bid_count, created_at]

    AuctionsPage:
      type: object
      properties:
        auctions:
          type: array
          items: { $ref: "#/components/schemas/AuctionRow" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
      required: [auctions, total, limit, offset]

    EventStats:
      type: object
      properties:
        impressions: { type: integer }
        clicks: { type: integer }
        viewable: { type: integer }
      required: [impressions, clicks, viewable]

    Stats:
      type: object
      properties:
        auction_count: { type: integer }
        total_spend: { type: number, format: double }
        publisher_revenue: { type: number, format: double }
        exchange_revenue: { type: number, format: double }
        advertiser_count: { type: integer }
        publisher_count: { type: integer }
      required: [auction_count, total_spend, publisher_revenue, exchange_revenue, advertiser_count, publisher_count]

    RevenuePeriod:
      type: object
      properties:
        period: { type: string }
        auction_count: { type: integer }
        total_spend: { type: number, format: double }
        publisher_revenue: { type: number, format: double }
        exchange_revenue: { type: number, format: double }
      required: [period, auction_count, total_spend, publisher_revenue, exchange_revenue]

    RevenuePage:
      type: object
      properties:
        group_by: { type: string }
        periods:
          type: array
          items: { $ref: "#/components/schemas/RevenuePeriod" }
      required: [group_by, periods]

    AdvertiserSpend:
      type: object
      properties:
        advertiser_id: { type: string }
        name: { type: string }
        total_spend: { type: number, format: double }
        auction_count: { type: integer }
      required: [advertiser_id, name, total_spend, auction_count]

    AdvertiserWithBudget:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        intent: { type: string }
        sigma: { type: number, format: double }
        bid_price: { type: number, format: double }
        budget_total: { type: number, format: double }
        budget_spent: { type: number, format: double }
        currency: { type: string }
        url: { type: string }
      required: [id, name, intent, sigma, bid_price, budget_total, budget_spent, currency, url]

    Publisher:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        domain: { type: string }
        created_at: { type: string }
      required: [id, name, domain, created_at]

    PublisherStats:
      type: object
      properties:
        auction_count: { type: integer }
        total_revenue: { type: number, format: double }
        currency: { type: string }
      required: [auction_count, total_revenue, currency]

    IntakeSubmission:
      type: object
      properties:
        id: { type: integer, format: int64 }
        type: { type: string }
        name: { type: string }
        email: { type: string }
        company: { type: string }
        detail: { type: string }
        description: { type: string }
        created_at: { type: string }
      required: [id, type, name, email, company, detail, description, created_at]

    ORTBBidRequest:
      type: object
      description: |
        Subset of OpenRTB 2.5 BidRequest that this exchange reads. Fields not
        listed are accepted but ignored. `id` and `imp[0].id` are required.
      properties:
        id: { type: string }
        imp:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              id: { type: string }
              bidfloor:
                type: number
                format: double
                description: Per-click floor (VCG unit), not CPM.
              ext: { $ref: "#/components/schemas/ORTBExt" }
            required: [id]
        site: { $ref: "#/components/schemas/ORTBSite" }
        app: { $ref: "#/components/schemas/ORTBSite" }
        user:
          type: object
          properties:
            keywords: { type: string }
        cur:
          type: array
          items: { type: string }
          description: Allowed currencies. Empty is treated as [USD].
        test:
          type: integer
          description: 1 = test request; never logged, never billable.
        ext: { $ref: "#/components/schemas/ORTBExt" }
      required: [id, imp]

    ORTBSite:
      type: object
      description: Used for both `site` and `app`.
      properties:
        id: { type: string }
        content:
          type: object
          properties:
            keywords:
              type: string
              description: Comma-separated; each keyword embedded and scored separately.
        publisher:
          type: object
          properties:
            id: { type: string }

    ORTBExt:
      type: object
      properties:
        vectorspace:
          type: object
          properties:
            embedding:
              type: array
              items: { type: number, format: double }
            intent: { type: string }

    ORTBBidResponse:
      type: object
      properties:
        id: { type: string }
        cur: { type: string }
        seatbid:
          type: array
          items:
            type: object
            properties:
              seat: { type: string }
              bid:
                type: array
                items: { $ref: "#/components/schemas/ORTBBid" }
            required: [bid]
      required: [id, seatbid]

    ORTBBid:
      type: object
      properties:
        id: { type: string }
        impid: { type: string }
        price:
          type: number
          format: double
          description: Amount charged if clicked (per-click VCG), not CPM.
        adid: { type: string }
        adm:
          type: string
          description: Self-contained HTML anchor whose href routes through GET /click.
        adomain:
          type: array
          items: { type: string }
        ext:
          type: object
          description: |
            Carries `vectorspace.{auction_id, advertiser, sigma, score,
            click_url, ad_title, ad_subtitle, settlement}`; `settlement` is
            always `"cpc-vcg"`.
          properties:
            vectorspace:
              type: object
              properties:
                auction_id: { type: integer, format: int64 }
                advertiser: { type: string }
                sigma: { type: number, format: double }
                score: { type: number, format: double }
                click_url: { type: string }
                ad_title: { type: string }
                ad_subtitle: { type: string }
                settlement: { type: string, enum: [cpc-vcg] }
      required: [id, impid, price]

    TrustEdge:
      type: object
      properties:
        id: { type: integer, format: int64 }
        attestation_id: { type: string }
        from_addr: { type: string }
        to_addr: { type: string }
        kind: { type: string, enum: [bilateral, unilateral] }
        attestation_type: { type: string }
        weight: { type: number, format: double }
        created_at: { type: string, format: date-time }
      required: [id, attestation_id, from_addr, to_addr, kind, attestation_type, weight, created_at]

    TrustNode:
      type: object
      properties:
        addr: { type: string }
        edge_count: { type: integer }
        bilateral_count: { type: integer }
        unilateral_count: { type: integer }
        oldest_edge: { type: string }
        newest_edge: { type: string }
      required: [addr, edge_count, bilateral_count, unilateral_count, oldest_edge, newest_edge]

    Attestation:
      type: object
      properties:
        attestation_id: { type: string }
        attestation_type: { type: string }
        attestor_email: { type: string }
        subject: { type: string }
        status: { type: string, enum: [pending, confirmed, revoked] }
        edge_kind: { type: string, enum: [bilateral, unilateral] }
        dkim_verified: { type: boolean }
        payload:
          type: object
          additionalProperties: true
        published_fields:
          type: object
          additionalProperties: true
        received_at: { type: string, format: date-time }
        confirmed_at: { type: string, format: date-time }
        revoked_at: { type: string, format: date-time }
      required: [attestation_id, attestation_type, attestor_email, subject, status, edge_kind, dkim_verified, payload, published_fields, received_at]

    TrustAttestSubmit:
      type: object
      description: |
        Free-form attestation submission. `sender_email` is always required.
        `action` selects the operation; extra fields are captured into the
        stored payload.
      additionalProperties: true
      properties:
        sender_email: { type: string, format: email }
        action: { type: string, enum: [confirm, revoke] }
        attestation_id: { type: string }
        attestation_type: { type: string }
        subject: { type: string }
        reason: { type: string }

    PublishPreference:
      type: object
      properties:
        subject_email: { type: string, format: email }
        publish:
          type: array
          items: { type: string }
        redact:
          type: array
          items: { type: string }
      required: [subject_email]
