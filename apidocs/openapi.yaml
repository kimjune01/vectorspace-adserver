              required: [name, email, password]
      responses:
        "201":
          description: Created publisher
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, example: pub-1 }
                  name: { type: string }
                  domain: { type: string }
                  email: { type: string }
                  token: { type: string }
                required: [id, name, domain, email, token]
        "400": { $ref: "#/components/responses/PlainTextError" }
        "401": { $ref: "#/components/responses/PlainTextError" }
        "405": { $ref: "#/components/responses/PlainTextError" }
        "500": { $ref: "#/components/responses/PlainTextError" }

  /stats:
